name: checkout-api-leak-test

target:
  http:
    url:    http://localhost:3000/api/checkout
    method: POST

workload:
  warmup:      200
  iterations:  10_000
  sample_every: 100

assertions:
  - type: growth_rate
    max: "0.5kb/iter"

  - type: stable
    tolerance_mb: 5.0

  - type: ceiling
    max_mb: 400.0

  - type: no_step_change
    max_delta_mb: 10.0
