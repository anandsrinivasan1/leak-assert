name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents:      write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file:   release-please-config.json
          manifest-file: .release-please-manifest.json

      # ── Trigger publish when release-please merges a release PR ──────────────
      - name: Tag and push for publish workflow
        if: ${{ steps.release.outputs.release_created }}
        run: |
          echo "Release created: ${{ steps.release.outputs.tag_name }}"
          # The publish.yml workflow is triggered by tag pushes.
          # release-please already creates the tag when it merges the PR.
